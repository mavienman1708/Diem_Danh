<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Quét mã QR</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h2 class="title">Quét mã QR</h2>

      <div id="notify" class="notify"></div>

      <button id="scanBtn" onclick="toggleScanner()" class="scanBtn">
        Start Scan
      </button>

      <div class="cameraBox">
        <div id="reader"></div>

        <div class="scan-frame">
          <span class="corner tl"></span>
          <span class="corner tr"></span>
          <span class="corner bl"></span>
          <span class="corner br"></span>
        </div>
      </div>

      <p class="count">Tổng số đã điểm danh: <b id="count">0</b></p>

      <ul id="scanList"></ul>
    </div>

    <script src="script.js"></script>
  </body>
</html>
